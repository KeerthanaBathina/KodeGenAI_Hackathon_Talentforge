adapter:
  name: bigquery
  type: target
  platform: GCP
  description: >
    Google Cloud BigQuery / Cloud Composer (Airflow) target adapter.
    Generates Cloud Composer DAG Python files from the normalized workflow schema.
    BigQuery workflows are orchestrated via Apache Airflow DAGs running on Cloud Composer.
    Each task maps to an Airflow operator (DataprocSubmitJobOperator, BigQueryInsertJobOperator,
    or PythonOperator). Schedules use cron expressions native to Airflow.

  output_format:
    type: "python"
    extension: ".py"
    note: "Output is an Airflow DAG Python file for deployment to Cloud Composer"

  generation:
    structure: |
      from airflow import DAG
      from airflow.providers.google.cloud.operators.dataproc import DataprocSubmitJobOperator
      from airflow.providers.google.cloud.operators.bigquery import BigQueryInsertJobOperator
      from airflow.operators.python import PythonOperator
      from airflow.utils.dates import days_ago
      from datetime import timedelta

      default_args = {
          "owner": "propeliq",
          "depends_on_past": False,
          "retries": {default_retries},
          "retry_delay": timedelta(minutes=5),
          "email_on_failure": False,
      }

      with DAG(
          dag_id="{workflow_name_snake}",
          default_args=default_args,
          description="{workflow_name} — converted by PropelIQ Adapter Engine",
          schedule_interval="{cron_expression}",
          start_date=days_ago(1),
          catchup=False,
          tags=["{source_platform}", "converted"],
      ) as dag:
          {task_definitions}

    task_generation:
      type_mapping:
        notebook:
          airflow_operator: "DataprocSubmitJobOperator"
          fields:
            task_id: "{task_id}"
            project_id: "{gcp_project_id}"
            region: "{gcp_region}"
            job:
              reference:
                project_id: "{gcp_project_id}"
              placement:
                cluster_name: "{dataproc_cluster_name}"
              pyspark_job:
                main_python_file_uri: "gs://{bucket}/scripts/{task_id}.py"
                args: "{parameters_list}"
          note: "Notebook converted to PySpark script deployed to GCS for Dataproc"
        spark_job:
          airflow_operator: "DataprocSubmitJobOperator"
          fields:
            task_id: "{task_id}"
            project_id: "{gcp_project_id}"
            region: "{gcp_region}"
            job:
              pyspark_job:
                main_python_file_uri: "{config.main_file}"
                args: "{parameters_list}"
        data_copy:
          airflow_operator: "BigQueryInsertJobOperator"
          fields:
            task_id: "{task_id}"
            configuration:
              query:
                query: "INSERT INTO `{target_table}` SELECT * FROM `{source_table}`"
                useLegacySql: false
        sql_task:
          airflow_operator: "BigQueryInsertJobOperator"
          fields:
            task_id: "{task_id}"
            configuration:
              query:
                query: "{config.query}"
                useLegacySql: false
        sub_pipeline:
          airflow_operator: "TriggerDagRunOperator"
          fields:
            task_id: "{task_id}"
            trigger_dag_id: "{config.pipeline_ref}"
            conf: "{parameters}"
        parallel_group:
          handling: |
            Airflow supports native parallel execution — tasks with no dependencies
            between them run in parallel automatically.
            Flatten parallel tasks as independent operators with shared upstream set_upstream().
        conditional_branch:
          airflow_operator: "BranchPythonOperator"
          handling: |
            Map to BranchPythonOperator with a Python callable that returns the next task_id.

  dependencies:
    generation: |
      Airflow uses set_upstream() / set_downstream() or >> / << operators.
      FOR each normalized dependency (source_task → target_task):
        Generate: {target_task_id}.set_upstream({source_task_id})
        Or using bitshift: {source_task_id} >> {target_task_id}
      Root tasks (no dependencies) have no set_upstream() call.
      Condition mapping:
        success → default Airflow success dependency (no special handling needed)
        failure → TriggerRule.ONE_FAILED on the downstream task
        completed → TriggerRule.ALL_DONE on the downstream task

  triggers:
    generation:
      conversion_rules: |
        FROM normalized trigger:
          IF type == "cron":
            Use cron expression directly in DAG schedule_interval
            Airflow uses standard 5-field cron: min hour dom month dow
            Strip seconds field if present (Airflow does not use seconds)
          IF type == "event":
            Set schedule_interval=None and use Cloud Storage sensor or Pub/Sub sensor
          IF type == "manual":
            Set schedule_interval=None (manual trigger only)

  parameters:
    generation: |
      Airflow DAG parameters are passed via dag_run.conf or as Airflow Variables.
      Convert normalized flat key-value to:
        - Operator-level: passed as args list to DataprocSubmitJobOperator
        - DAG-level: accessed via {{ dag_run.conf.get("param_name", "default") }}

  timeout:
    generation: |
      Convert seconds → timedelta for Airflow execution_timeout:
        execution_timeout=timedelta(seconds={timeout_seconds})
      Apply per-task in operator definition.

  compute:
    generation: |
      GCP Dataproc cluster config is generated as a companion JSON:
      {
        "project_id": "{gcp_project_id}",
        "region": "{gcp_region}",
        "cluster_name": "{dataproc_cluster_name}",
        "config": {
          "master_config": {
            "num_instances": 1,
            "machine_type_uri": "{master_machine_type}"
          },
          "worker_config": {
            "num_instances": {num_workers},
            "machine_type_uri": "{worker_machine_type}"
          },
          "software_config": {
            "image_version": "{dataproc_image_version}"
          }
        }
      }
      node_size_mapping:
        small:   { machine_type: "n1-standard-4",  dataproc_image: "2.1-debian11" }
        medium:  { machine_type: "n1-standard-8",  dataproc_image: "2.1-debian11" }
        large:   { machine_type: "n1-standard-16", dataproc_image: "2.1-debian11" }
        xlarge:  { machine_type: "n1-standard-32", dataproc_image: "2.1-debian11" }
