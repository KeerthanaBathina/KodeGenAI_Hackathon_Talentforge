adapter:
  name: synapse
  type: target
  platform: Azure
  description: >
    Azure Synapse Analytics Pipeline target adapter.
    Generates Synapse Pipeline JSON from the normalized workflow schema.
    Synapse pipelines share the same ARM-based structure as ADF but run within
    a Synapse workspace and support Synapse-specific linked services and compute pools.

  output_format:
    type: "json"
    extension: ".json"
    template_ref: "templates/adf.json"

  generation:
    structure: |
      {
        "name": "{workflow_name}",
        "properties": {
          "activities": [],
          "parameters": {},
          "annotations": [],
          "description": "Converted by PropelIQ Adapter Engine"
        }
      }

    task_generation:
      task_structure: |
        {
          "name": "{task_id}",
          "type": "{synapse_activity_type}",
          "dependsOn": [],
          "policy": {
            "timeout": "{timeout_iso}",
            "retry": {retry_count},
            "retryIntervalInSeconds": 30,
            "secureOutput": false,
            "secureInput": false
          },
          "userProperties": [],
          "typeProperties": {}
        }

      type_mapping:
        notebook:
          synapse_type: "SynapseNotebook"
          type_properties:
            notebook:
              referenceName: "{task_id}"
              type: "NotebookReference"
            parameters: "{parameters_typed}"
            sparkPool:
              referenceName: "{spark_pool_name}"
              type: "BigDataPoolReference"
          note: "Synapse uses SynapseNotebook activity with BigDataPool reference"
        spark_job:
          synapse_type: "SparkJob"
          type_properties:
            sparkJob:
              referenceName: "{config.main_file}"
              type: "SparkJobDefinitionReference"
            arguments: "{parameters_list}"
        data_copy:
          synapse_type: "Copy"
          type_properties:
            source: "{config.source}"
            sink: "{config.sink}"
            enableStaging: false
        sub_pipeline:
          synapse_type: "ExecutePipeline"
          type_properties:
            pipeline:
              referenceName: "{config.pipeline_ref}"
              type: "PipelineReference"
            parameters: "{parameters}"
            waitOnCompletion: true
        sql_task:
          synapse_type: "SqlPoolStoredProcedure"
          type_properties:
            sqlPool:
              referenceName: "{sql_pool_name}"
              type: "SqlPoolReference"
            storedProcedureName: "{config.procedure}"
            storedProcedureParameters: "{parameters}"
        http_task:
          synapse_type: "WebActivity"
          type_properties:
            url: "{config.url}"
            method: "{config.method}"
            headers: {}
        lookup:
          synapse_type: "Lookup"
          type_properties:
            source: "{config.source}"
            firstRowOnly: false
        parallel_group:
          handling: |
            Synapse does not have a native parallel container.
            Flatten parallel tasks as independent activities with shared upstream dependsOn.
        conditional_branch:
          synapse_type: "IfCondition"
          type_properties:
            expression:
              value: "{condition}"
              type: "Expression"
            ifTrueActivities: []
            ifFalseActivities: []

  dependencies:
    generation: |
      FOR each normalized dependency:
        ADD to activity.dependsOn array:
        {
          "activity": "{source_task_id}",
          "dependencyConditions": ["{condition_mapped}"]
        }
      Condition mapping:
        success → "Succeeded"
        failure → "Failed"
        completed → "Completed"
        skipped → "Skipped"

  triggers:
    generation:
      schedule_structure: |
        {
          "name": "{trigger_name}",
          "properties": {
            "type": "ScheduleTrigger",
            "typeProperties": {
              "recurrence": {
                "frequency": "{frequency}",
                "interval": {interval},
                "startTime": "{start_time}",
                "timeZone": "{timezone}",
                "schedule": {
                  "hours": [{hours}],
                  "minutes": [{minutes}]
                }
              }
            },
            "pipelines": [
              {
                "pipelineReference": {
                  "referenceName": "{workflow_name}",
                  "type": "PipelineReference"
                }
              }
            ]
          }
        }
      conversion_rules: |
        FROM normalized trigger:
          IF type == "cron":
            Parse cron fields → map to Synapse recurrence (frequency, interval, schedule)
          IF type == "event":
            Generate BlobEventsTrigger (storage event trigger)
          IF type == "manual":
            No trigger generated (manual execution)

  parameters:
    generation: |
      Convert normalized parameters to Synapse typed format:
      {
        "param_name": {
          "type": "String",
          "defaultValue": "value"
        }
      }
      Place under properties.parameters.

  timeout:
    generation: |
      Convert seconds → ISO 8601 duration:
        3600s → "01:00:00"
        86400s → "1.00:00:00"
      Format: "[days.]HH:MM:SS"

  compute:
    generation: |
      Synapse uses Apache Spark pools (BigDataPool) for notebook and Spark job activities.
      Generate BigDataPoolReference in activity typeProperties.
      Default pool name: "sparkpool01" (override via target environment config).
      For dedicated SQL pool activities, use SqlPoolReference.
      Compute specs (node size, min/max nodes) are defined on the Spark pool, not the pipeline.
      node_size_mapping:
        small: "Small"      # 4 vCPU, 28 GB
        medium: "Medium"    # 8 vCPU, 56 GB
        large: "Large"      # 16 vCPU, 112 GB
        xlarge: "XLarge"    # 32 vCPU, 224 GB
