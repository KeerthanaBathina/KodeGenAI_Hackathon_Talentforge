adapter:
  name: bigquery
  type: target
  platform: GCP
  description: >
    Google BigQuery target adapter. Writes data to BigQuery tables
    and GCS paths via Spark BigQuery connector and google-cloud libraries.

  runtime:
    spark_session: "manual"
    initialization: |
      from pyspark.sql import SparkSession
      spark = SparkSession.builder \
          .appName("{app_name}") \
          .config("spark.jars.packages", "com.google.cloud.spark:spark-bigquery-with-dependencies_2.12:0.32.2") \
          .config("temporaryGcsBucket", "{temp_gcs_bucket}") \
          .getOrCreate()
    spark_config_migration: |
      spark.conf.set("{config_key}", "{config_value}")

  write_logic:
    spark:
      catalog_write: |
        df.write.format("bigquery") \
            .option("table", "{project_id}.{dataset}.{table}") \
            .option("temporaryGcsBucket", "{temp_gcs_bucket}") \
            .mode("overwrite") \
            .save()
      path_write: |
        df.write.mode("overwrite") \
            .parquet("gs://{gcs_bucket}/{path}")
    python:
      write: |
        from google.cloud import bigquery
        client = bigquery.Client(project="{project_id}")
        job_config = bigquery.LoadJobConfig(write_disposition="WRITE_TRUNCATE")
        job = client.load_table_from_dataframe(df, "{project_id}.{dataset}.{table}", job_config=job_config)
        job.result()
    sql:
      write: |
        CREATE OR REPLACE TABLE `{project_id}.{dataset}.{table}`
        AS SELECT * FROM temp_view;

  parameters:
    definition: |
      import argparse
      parser = argparse.ArgumentParser()
      parser.add_argument('--{param_name}', required=True)
    extraction: |
      args = parser.parse_args()
      value = args.{param_name}
    format: "argparse"

  secrets:
    method: "google_secret_manager"
    write: |
      from google.cloud import secretmanager
      client = secretmanager.SecretManagerServiceClient()
      name = f"projects/{project_id}/secrets/{secret_name}/versions/latest"
      value = client.access_secret_version(request={"name": name}).payload.data.decode("UTF-8")

  imports:
    add:
      - "from pyspark.sql import SparkSession"
    platform_specific:
      - "google.cloud.bigquery"
      - "google.cloud.storage"

  storage:
    prefix: "gs://"
    path_format: "gs://{gcs_bucket}/{path}"
    bigquery_format: "{project_id}.{dataset}.{table}"

  notebook_format:
    type: "py"
    header_cell: |
      # BigQuery PySpark script
      # Converted by PropelIQ Adapter Engine
    metadata:
      kernel: "python3"
      language: "python"
    sql_cell_strategy:
      description: >
        For SQL statements targeting BigQuery, prefer the BigQuery Python client
        or spark.sql() with the BigQuery connector. Do NOT use %%sql cell magic
        as it is not available in Dataproc/standalone PySpark scripts.
      pattern: |
        df = spark.read.format("bigquery") \
            .option("query", "{sql_statement}") \
            .load()
      use_spark_sql_for:
        - "Intermediate transformations on DataFrames already loaded into Spark"
        - "CREATE TEMP VIEW statements for multi-step logic"
        - "Window functions and aggregations on in-memory DataFrames"
      use_bigquery_client_for:
        - "DDL operations (CREATE TABLE, DROP TABLE) on BigQuery native tables"
        - "DML operations (INSERT, UPDATE, DELETE, MERGE) on BigQuery tables"
        - "Queries that must run natively in BigQuery (not via Spark connector)"
      do_not_use:
        - "%%sql magic (not available in .py scripts or Dataproc notebooks)"
        - "spark.sql(\"\"\"...multi-line...\"\"\") for BigQuery DDL (use client API instead)"

  catalog:
    operations:
      - normalized: "spark.read.table"
        target: "spark.read.format(\"bigquery\").option(\"table\", \"{project_id}.{dataset}.{table}\").load()"
      - normalized: "df.write.saveAsTable"
        target: "df.write.format(\"bigquery\").option(\"table\", \"{project_id}.{dataset}.{table}\").mode(\"overwrite\").save()"

  enhancements:
    - "BigQuery Storage API for fast reads"
    - "GCS staging for large writes"
    - "BigQuery partitioning and clustering"
    - "Materialized views for performance"

  transformations:
    - convert_magic_commands
    - replace_platform_utils
    - adjust_imports
    - convert_storage_paths
    - convert_catalog_operations
    - convert_parameters
    - convert_secrets

  output:
    format: py
