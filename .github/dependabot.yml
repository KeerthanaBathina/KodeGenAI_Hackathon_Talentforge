version: 2

updates:
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: UTC
    open-pull-requests-limit: 5
    target-branch: main
    labels:
      - dependencies
      - frontend
    commit-message:
      prefix: "chore(deps):"
      include: scope
    groups:
      frontend-patch-updates:
        update-types:
          - patch
    allow:
      - dependency-type: all

  - package-ecosystem: npm
    directory: /backend
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: UTC
    open-pull-requests-limit: 5
    target-branch: main
    labels:
      - dependencies
      - backend
    commit-message:
      prefix: "chore(deps):"
      include: scope
    groups:
      backend-patch-updates:
        update-types:
          - patch
    allow:
      - dependency-type: all

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: UTC
    open-pull-requests-limit: 5
    target-branch: main
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "chore(actions):"
      include: scope
    groups:
      actions-updates:
        update-types:
          - minor
          - patch
